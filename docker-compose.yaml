services:
  db:
    image: postgres:15-alpine
    container_name: iot_postgres
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: 
      context: ./backend
      dockerfile: Dockerfile
    container_name: iot_fastapi
    restart: unless-stopped
    ulimits:
      nofile:
        soft: 65536
        hard: 65536
    depends_on:
      db:
        condition: service_healthy 
    env_file:
      - .env
    ports:
      - "${HOST_PORT_BACKEND:-8000}:8000"
    volumes:
      - ./backend:/app
    command: uvicorn api.main:app --host 0.0.0.0 --port 8000 --reload --reload-dir /app/api
    
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: iot_frontend
    restart: unless-stopped
    ulimits:
      nofile:
        soft: 65536
        hard: 65536
    ports:
      - "${HOST_PORT_FRONTEND:-5173}:5173" 
    depends_on:
      - backend
    env_file:
      - .env
    volumes:
      - ./frontend:/app
      - /app/node_modules 

  packet_sniffer:
    build:
      context: ./packet_sniffer 
      dockerfile: Dockerfile
    container_name: iot_sniffer
    restart: unless-stopped
    network_mode: "service:backend"
    cap_add:
      - NET_ADMIN
      - NET_RAW
    depends_on:
      - backend
    env_file:
      - .env
    volumes:
      - ./packet_sniffer:/app

volumes:
  pgdata: