services:
  db:
    image: postgres:16-alpine
    container_name: iot_postgres
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -d $${POSTGRES_DB} -U $${POSTGRES_USER}"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: 
      context: ./backend
      dockerfile: Dockerfile
    container_name: iot_fastapi
    restart: unless-stopped
    ulimits:
      nofile:
        soft: 65536
        hard: 65536
    depends_on:
      db:
        condition: service_healthy 
    env_file:
      - .env
    ports:
      - "${HOST_PORT_BACKEND:-8000}:8000"
    volumes:
      - ./backend:/app
    command: uvicorn api.app:app --host 0.0.0.0 --port 8000 --reload --reload-dir /app/api
    
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: iot_frontend
    restart: unless-stopped
    ulimits:
      nofile:
        soft: 65536
        hard: 65536
    ports:
      - "${HOST_PORT_FRONTEND:-5173}:5173" 
    depends_on:
      - backend
    env_file:
      - .env
    volumes:
      - ./frontend:/app
      - /app/node_modules 

  server_sniffer:
    build:
      context: ./packet_sniffer 
      dockerfile: Dockerfile
    container_name: iot_server_sniffer
    restart: unless-stopped
    network_mode: "service:server"
    cap_add:
      - NET_ADMIN
      - NET_RAW
    depends_on:
      - server
    env_file:
      - .env
    environment:
      MONITORED_PORT: ${SERVER_SNIFFER_PORT:-5000}
    volumes:
      - ./packet_sniffer:/app

  backend_sniffer:
    build:
      context: ./packet_sniffer 
      dockerfile: Dockerfile
    container_name: iot_backend_sniffer
    restart: unless-stopped
    network_mode: "service:backend"
    cap_add:
      - NET_ADMIN
      - NET_RAW
    depends_on:
      - backend
    env_file:
      - .env
    environment:
      MONITORED_PORT: ${BACKEND_SNIFFER_PORT:-8000}
    volumes:
      - ./packet_sniffer:/app

  client:
    build:
      context: ./client 
      dockerfile: Dockerfile
    container_name: iot_client
    restart: unless-stopped
    env_file:
      - .env
    environment:
      SERVER_HOST: ${CLIENT_SERVER_HOST:-server}
      PORT: ${CLIENT_PORT:-5000}
    depends_on:
      - server
      - backend
    volumes:
      - ./client:/app

  server:
    build:
      context: ./server 
      dockerfile: Dockerfile
    container_name: iot_server
    restart: unless-stopped
    stdin_open: true
    tty: true
    env_file:
      - .env
    environment:
      BIND_HOST: ${SERVER_BIND_HOST:-0.0.0.0}
      PORT: ${SERVER_PORT:-5000}
    ports:
      - "${HOST_PORT_SERVER:-5000}:5000"
    volumes:
      - ./server:/app

volumes:
  pgdata:
